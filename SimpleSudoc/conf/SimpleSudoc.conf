# SimpleSudoc.conf — Configuration du plugin d'import SUDOC (ABES)
# -------------------------------------------------------

# Mettre à 0 pour désactiver le plugin
enabled = 1

# Locale utilisée pour l'import (fr_FR = 7 sur Cognitio-Fort)
locale_id = 7

# Nombre maximum de résultats retournés par une recherche SRU texte
max_results = 20

# Type d'objet par défaut. Le SUDOC est principalement utilisé sur
# Cognitio-Fort pour les revues / périodiques.
default_type = revue

# Délai (secondes) entre deux requêtes consécutives au SUDOC. L'API SRU
# de l'ABES est plus permissive que Gallica mais on reste poli.
rate_limit_delay = 2

# User-Agent envoyé au SUDOC
user_agent = CollectiveAccess/SimpleSudocPlugin (idéesculture)
