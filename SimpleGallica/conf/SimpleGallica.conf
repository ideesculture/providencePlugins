# SimpleGallica.conf — Configuration du plugin d'import Gallica (BnF)
# -------------------------------------------------------

# Mettre à 0 pour désactiver le plugin
enabled = 1

# Locale utilisée pour l'import (fr_FR = 7 sur Cognitio-Fort)
locale_id = 7

# Nombre maximum de résultats retournés par une recherche SRU
max_results = 20

# Type d'objet par défaut si dc:type n'est pas reconnu
default_type = iconographie

# Correspondance entre les valeurs dc:type Gallica (en minuscule) et les
# type codes ca_objects de Cognitio-Fort. Les valeurs Gallica peuvent contenir
# du texte libre, le mapping est testé par sous-chaîne.
type_mapping = {
	monographie  = ouvrage,
	livre        = ouvrage,
	ouvrage      = ouvrage,
	fascicule    = revue,
	periodique   = revue,
	revue        = revue,
	image        = iconographie,
	carte        = iconographie,
	plan         = iconographie,
	estampe      = iconographie,
	gravure      = iconographie,
	photographie = iconographie,
	manuscrit    = ouvrage
}

# Téléchargement automatique de l'image haute résolution (Gallica /f1.highres)
# au moment de l'import. Mettre à 0 pour ne créer que la fiche bibliographique.
download_image = 1

# Délai (secondes) entre deux requêtes consécutives à Gallica, pour ne pas
# se faire rate-limiter (TLS reset). Ne pas descendre sous 3.
rate_limit_delay = 5

# User-Agent envoyé à Gallica. Un UA navigateur est nécessaire pour
# /f1.highres (Gallica refuse les UAs "bot" sur les images).
user_agent = Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 Chrome/120.0 Safari/537.36
