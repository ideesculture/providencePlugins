# Set to 0 to disable the SimpleZ3950 plugin
enabled = 1

# Si 1, l'action /Import est neutralisée et le bouton « Importer » est masqué
# dans la liste de résultats. Utile en mode « recherche seule » tant qu'aucun
# mapping (ci-dessous ou XLSX externe) n'est en place. Défaut : 0.
import_disabled = 0

# -----------------------------------------------------------------------------
# Mapping MARC → ca_objects / ca_entities (mode conf-driven, recommandé)
# -----------------------------------------------------------------------------
# Si la clé `mappings` est définie, l'import se fait en PHP en parsant la
# notice MARC binaire : pas besoin de mapping XLSX externe ni de caUtils.
# Si `mappings` est absent, on retombe sur l'ancien comportement
# (`caUtils import-data -m z3950_import_marc -f marc`) — la mapping doit alors
# être chargée en base manuellement.
#
# Syntaxe source : <tag><subcodes>. Exemples :
#   "001"   = controlfield 001
#   "200a"  = datafield 200, sous-champ a
#   "700ab" = datafield 700, concat des sous-champs a et b avec un espace
#
# Syntaxe cible :
#   "ca_objects.preferred_labels"           → label préféré (1ère valeur gagne)
#   "ca_objects.preferred_labels:append"    → concat à la valeur existante
#   "ca_objects.<element_code>"             → attribut (Text/DateRange/Url…)
#   "ca_objects.idno"                       → identifiant unique (overwrite)
#   "ca_entities[ind]%relation:<rel_code>"  → entité personne liée
#   "ca_entities[org]%relation:<rel_code>"  → entité collectivité liée
#
# Plusieurs sources vers la MÊME cible d'attribut : concat avec "; " auto.
# Pour les entités liées, le sous-champ $3 (PPN d'autorité s'il existe) est
# stocké comme idno d'entité (préfixe "ppn:") pour dédupliquer.
# -----------------------------------------------------------------------------
# Décommenter et adapter selon votre profil :
# mappings = {
#     unimarc = {
#         "001"   = "ca_objects.idno",
#         "200a"  = "ca_objects.preferred_labels",
#         "200e"  = "ca_objects.preferred_labels:append",
#         "210c"  = "ca_objects.editeur",
#         "210d"  = "ca_objects.date",
#         "330a"  = "ca_objects.description",
#         "606a"  = "ca_objects.motscles",
#         "700ab" = "ca_entities[ind]%relation:author",
#         "710ab" = "ca_entities[org]%relation:author"
#     },
#     marc21 = {
#         "245a" = "ca_objects.preferred_labels"
#     }
# }

# Locale d'import (à adapter au profil cible)
# locale_id = 1

# Type ca_objects créé par défaut
