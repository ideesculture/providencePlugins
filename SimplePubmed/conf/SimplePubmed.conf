# SimplePubmed.conf — Configuration du plugin d'import PubMed
# -------------------------------------------------------

# Mettre à 0 pour désactiver le plugin
enabled = 1

# Clé API NCBI (optionnelle, augmente le nombre de requêtes autorisées)
# Obtenir une clé sur : https://www.ncbi.nlm.nih.gov/account/
ncbi_api_key =

# Nombre maximum de résultats retournés par une recherche texte
max_results = 20

# Locale utilisée pour l'import (fr_FR = 7 dans cette installation)
locale_id = 7

# Type d'objet par défaut si le type PubMed n'est pas reconnu
default_type = other_bibl

# Correspondance entre les types de publication PubMed et les types d'objets CA
type_mapping = {
    Journal Article  = journal_article,
    Review           = review,
    Case Reports     = case_report,
    Clinical Trial   = clinical_trial,
    Practice Guideline = guideline,
    Book Chapter     = book_chapter,
    Congress         = conference_paper,
    Meta-Analysis    = review,
    Systematic Review = review
}
