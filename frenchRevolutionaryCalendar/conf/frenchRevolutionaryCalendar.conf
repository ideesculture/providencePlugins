# Default configuration for frenchRevolutionaryCalendar plugin
# To enable on a specific instance, copy this file to conf/local/frenchRevolutionaryCalendar.conf
# and customize. Files in conf/local/ are gitignored.

# Set to 1 to enable the plugin
enabled = 0

# Set to 1 to strip square brackets from date expressions before parsing
# (useful for library catalogs where dates are written as "[an V]")
removeSquareBrackets = 1

# Keywords to strip from date expressions before parsing
# Useful for cleaning up bibliographic prefixes (DL = depot legal, IMPR = imprime, COP = copyright, etc.)
removeKeywords = ["DL","IMPR","COP","IMPR.","COP.","DL.","copyright","impr."]
