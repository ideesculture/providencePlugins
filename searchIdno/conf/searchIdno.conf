# Default configuration for searchIdno plugin
# To enable on a specific instance, copy this file to conf/local/searchIdno.conf
# and customize. Files in conf/local/ are gitignored.

# Set to 1 to enable the plugin
enabled = 0

# element_code of the ca_metadata_elements row used as the identifier searched.
# Common values: "idno", "cote", "inventory_number".
# The plugin uses ca_metadata_elements::getElementID() to resolve this code at runtime.
idno_element_code = idno

# Display template used for the identifier column in the results table.
# Use any standard CA template syntax (e.g. ^ca_objects.idno, ^ca_objects.cote, etc.).
result_identifier_template = ^ca_objects.idno

# Label displayed at the top of the identifier column in the results table.
result_identifier_label = Identifier

# DataTables i18n file URL (set empty to keep default English).
datatables_lang_url = //cdn.datatables.net/plug-ins/1.11.4/i18n/en_us.json
