# Default configuration for searchParent plugin
# To enable on a specific instance, copy this file to conf/local/searchParent.conf
# and set enabled = 1. Files in conf/local/ are gitignored.

# Set to 1 to enable the plugin
enabled = 0

# Maximum number of parents to search at once. Beyond this threshold,
# the search link is not displayed (the URL would be too long).
max_parents = 100
