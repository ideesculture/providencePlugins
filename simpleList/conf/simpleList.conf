# simpleList plugin configuration
#
# A "page" groups a set of ca_lists (referenced by list_code) under a single
# entry in a Providence menu. Each page becomes a menu item that opens a tree
# view of its lists, where editors can browse items and bulk-add new values.

enabled = 1

# Default page (used as a label key for menu entries).
default_page = listes

# List of pages defined below. Add one entry per page block.
pages = [
	"listes"
]

# Page block: each must define `label`, `menu` and `lists`.
#   label : string shown in the menu and as the page title
#   menu  : top-level menu key where this page is inserted
#           (typical Providence keys: "find", "edit", "manage", "import")
#   lists : array of ca_lists.list_code values to expose on this page
listes = {
	label = "Lists & vocabularies",
	menu = "find",
	lists = []
}
